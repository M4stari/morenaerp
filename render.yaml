services:
  - type: web
    name: erp-morena-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SELLER_EMAIL
        sync: false
      - key: SELLER_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: ERP Morena Concept

  - type: static
    name: erp-morena-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
