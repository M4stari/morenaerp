databases:
  - name: erp-morena-db
    databaseName: erp_morena
    user: erp_morena
    plan: free

services:
  - type: web
    name: erp-morena-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -c "from database import init_db; init_db()"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-morena-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SELLER_EMAIL
        sync: false
      - key: SELLER_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: ERP Morena Concept
      - key: PORT
        value: "10000"

  - type: web
    name: erp-morena-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
